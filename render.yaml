services:
  - type: web
    name: kilkenny-flood-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --preload
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
